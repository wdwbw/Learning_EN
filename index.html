<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f1115">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>VOCA — 英文單字 & 口說</title>
<style>
:root{
  --bg:#0f1115; --bg2:#171a21; --card:#1e222b; --card2:#262b36;
  --txt:#eef1f6; --sub:#9aa3b2; --line:#2c323e;
  --pri:#5b8cff; --pri2:#3f6fe0; --good:#34d399; --warn:#fbbf24; --bad:#f87171;
  --accent:#a78bfa;
  --r:18px; --rs:12px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{
  background:var(--bg); color:var(--txt);
  font-family:-apple-system,"Segoe UI",system-ui,"PingFang TC","Microsoft JhengHei",sans-serif;
  display:flex; flex-direction:column; height:100dvh; overflow:hidden;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.hidden{display:none!important}

/* ---- 頂部 ---- */
header{
  padding:calc(env(safe-area-inset-top,0px) + 14px) 18px 12px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:linear-gradient(180deg,var(--bg2),var(--bg));
}
header .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:19px;letter-spacing:.5px}
header .logo{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--pri),var(--accent));
  display:grid;place-items:center;font-size:15px;font-weight:900;color:#fff}
.streak{display:flex;align-items:center;gap:5px;background:var(--card);padding:7px 12px;border-radius:999px;font-size:13px;font-weight:700}
.streak b{color:var(--warn)}

/* ---- 主內容 ---- */
main{flex:1;overflow-y:auto;overflow-x:hidden;padding:6px 16px 20px;-webkit-overflow-scrolling:touch}
.view{animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ---- 底部分頁 ---- */
nav{
  display:flex;background:var(--bg2);border-top:1px solid var(--line);
  padding:8px 6px calc(8px + var(--safe-b));
}
nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--sub);font-size:11px;padding:4px 0;border-radius:12px;transition:.15s}
nav button .ic{font-size:21px;line-height:1}
nav button.active{color:var(--pri)}
nav button.active .ic{transform:translateY(-1px)}

/* ---- 卡片元件 ---- */
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-bottom:14px}
.row{display:flex;gap:12px}
.stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:var(--rs);padding:14px;text-align:center}
.stat .n{font-size:26px;font-weight:800}
.stat .l{font-size:12px;color:var(--sub);margin-top:2px}
.sec-title{font-size:13px;color:var(--sub);font-weight:700;margin:18px 4px 10px;letter-spacing:.5px}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--pri);color:#fff;
  padding:14px 18px;border-radius:14px;font-weight:700;font-size:15px;width:100%;transition:.12s}
.btn:active{transform:scale(.97)}
.btn.ghost{background:var(--card2);color:var(--txt)}
.btn.sm{padding:10px 14px;font-size:13px;width:auto}

/* ---- 學習卡 ---- */
.flash-wrap{display:flex;flex-direction:column;min-height:62vh}
.progbar{height:6px;background:var(--card2);border-radius:999px;overflow:hidden;margin-bottom:14px}
.progbar i{display:block;height:100%;background:linear-gradient(90deg,var(--pri),var(--accent));transition:width .3s}
.flash{
  flex:1;background:linear-gradient(160deg,var(--card2),var(--card));border:1px solid var(--line);
  border-radius:24px;padding:26px 22px;display:flex;flex-direction:column;justify-content:center;text-align:center;position:relative
}
.flash .theme-tag{position:absolute;top:16px;left:18px;font-size:12px;color:var(--accent);background:rgba(167,139,250,.12);padding:4px 10px;border-radius:999px}
.flash .lvl{position:absolute;top:16px;right:18px;font-size:11px;color:var(--sub)}
.flash .word{font-size:40px;font-weight:800;letter-spacing:.5px;margin-bottom:8px;word-break:break-word}
.flash .phon{font-size:17px;color:var(--sub);margin-bottom:18px}
.flash .pos{font-size:13px;color:var(--accent);font-weight:600}
.spk{width:54px;height:54px;border-radius:999px;background:var(--pri);color:#fff;display:grid;place-items:center;font-size:24px;margin:8px auto 0;transition:.12s}
.spk:active{transform:scale(.9)}
.spk.sm{width:40px;height:40px;font-size:18px;margin:0}
.divider{height:1px;background:var(--line);margin:18px 0}
.back .meaning{font-size:24px;font-weight:700;margin-bottom:4px}
.ex-block{text-align:left;background:rgba(91,140,255,.07);border:1px solid rgba(91,140,255,.18);border-radius:14px;padding:14px;margin-top:14px}
.ex-block .ex-en{font-size:17px;font-weight:600;line-height:1.5;display:flex;gap:8px;align-items:flex-start}
.ex-block .ex-zh{font-size:14px;color:var(--sub);margin-top:6px;line-height:1.5}
.ex-block + .ex-block{margin-top:10px}
.word-img{width:100%;height:150px;object-fit:cover;border-radius:14px;background:var(--card2);display:block}
.flash .word-img{height:120px;margin-bottom:6px}

.tap-hint{text-align:center;color:var(--sub);font-size:13px;padding:14px 0 4px}

/* ---- 評分按鈕 ---- */
.grades{display:flex;gap:8px;margin-top:14px}
.grades button{flex:1;padding:14px 6px;border-radius:14px;font-weight:700;font-size:14px;display:flex;flex-direction:column;gap:3px;align-items:center;transition:.12s}
.grades button:active{transform:scale(.95)}
.grades .g-again{background:rgba(248,113,113,.15);color:var(--bad)}
.grades .g-hard{background:rgba(251,191,36,.15);color:var(--warn)}
.grades .g-good{background:rgba(52,211,153,.15);color:var(--good)}
.grades .g-easy{background:rgba(91,140,255,.15);color:var(--pri)}
.grades small{font-size:10px;opacity:.8;font-weight:500}

/* ---- 口說 ---- */
.speak-card{text-align:center}
.target-sent{font-size:21px;font-weight:600;line-height:1.5;margin:6px 0 4px}
.mic-btn{width:84px;height:84px;border-radius:999px;background:linear-gradient(135deg,var(--pri),var(--pri2));color:#fff;
  display:grid;place-items:center;font-size:34px;margin:18px auto;box-shadow:0 8px 24px rgba(91,140,255,.35);transition:.15s}
.mic-btn.rec{background:linear-gradient(135deg,var(--bad),#dc2626);animation:pulse 1.2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(248,113,113,.5)}70%{box-shadow:0 0 0 18px rgba(248,113,113,0)}100%{box-shadow:0 0 0 0 rgba(248,113,113,0)}}
.score-ring{font-size:46px;font-weight:800;margin:6px 0}
.heard{font-size:15px;color:var(--sub);margin-top:6px;min-height:22px}
.heard .ok{color:var(--good);font-weight:700}
.heard .miss{color:var(--bad);text-decoration:line-through;opacity:.8}

/* ---- 單字庫列表 ---- */
.search{width:100%;background:var(--card);border:1px solid var(--line);color:var(--txt);
  padding:12px 14px;border-radius:12px;font-size:15px;margin-bottom:6px;outline:none}
.chips{display:flex;gap:8px;overflow-x:auto;padding:6px 2px 12px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;padding:8px 14px;border-radius:999px;background:var(--card);border:1px solid var(--line);font-size:13px;color:var(--sub)}
.chip.active{background:var(--pri);color:#fff;border-color:var(--pri)}
.witem{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:9px}
.witem .w{font-size:16px;font-weight:700}
.witem .m{font-size:13px;color:var(--sub);margin-top:2px}
.witem .meta{flex:1;min-width:0}
.witem .meta .m,.witem .meta .w{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{font-size:11px;padding:3px 8px;border-radius:999px;font-weight:700}
.badge.new{background:rgba(167,139,250,.16);color:var(--accent)}
.badge.due{background:rgba(251,191,36,.16);color:var(--warn)}
.badge.done{background:rgba(52,211,153,.16);color:var(--good)}

/* ---- 統計 ---- */
.heat{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:8px}
.heat div{aspect-ratio:1;border-radius:6px;background:var(--card2)}
.bars{display:flex;align-items:flex-end;gap:7px;height:120px;margin-top:10px}
.bars .b{flex:1;background:linear-gradient(180deg,var(--pri),var(--pri2));border-radius:6px 6px 0 0;min-height:3px;position:relative}
.bars .b span{position:absolute;bottom:-20px;left:0;right:0;text-align:center;font-size:10px;color:var(--sub)}

/* ---- 空狀態 ---- */
.empty{text-align:center;padding:50px 20px;color:var(--sub)}
.empty .big{font-size:50px;margin-bottom:12px}
.empty h3{color:var(--txt);margin:0 0 6px}

/* ---- Toast ---- */
.toast{position:fixed;left:50%;bottom:calc(80px + var(--safe-b));transform:translateX(-50%) translateY(20px);
  background:var(--card2);border:1px solid var(--line);padding:11px 18px;border-radius:999px;font-size:14px;
  opacity:0;transition:.25s;pointer-events:none;z-index:50;max-width:90vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ---- 設定 / 匯入 ---- */
textarea.imp{width:100%;min-height:130px;background:var(--bg);border:1px solid var(--line);color:var(--txt);
  border-radius:12px;padding:12px;font-family:ui-monospace,monospace;font-size:12px;outline:none}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--line)}
.setting-row:last-child{border-bottom:none}
.setting-row .lab{font-size:15px}
.setting-row .desc{font-size:12px;color:var(--sub);margin-top:2px}
.stepper{display:flex;align-items:center;gap:14px}
.stepper button{width:32px;height:32px;border-radius:9px;background:var(--card2);font-size:20px;display:grid;place-items:center}
.stepper b{min-width:30px;text-align:center;font-size:17px}
</style>
</head>
<body>

<header>
  <div class="brand"><div class="logo">V</div>VOCA</div>
  <div class="streak">🔥 連續 <b id="streakN">0</b> 天</div>
</header>

<main id="main"></main>

<nav>
  <button data-tab="home" class="active"><span class="ic">🏠</span>今日</button>
  <button data-tab="review"><span class="ic">🗂️</span>複習</button>
  <button data-tab="speak"><span class="ic">🎙️</span>口說</button>
  <button data-tab="lib"><span class="ic">📚</span>單字庫</button>
  <button data-tab="stats"><span class="ic">📊</span>統計</button>
</nav>

<div class="toast" id="toast"></div>

<script src="words.js"></script>
<script src="words-pack1.js"></script>
<script>
/* =====================================================================
   VOCA 學習引擎
   - 資料持久化：localStorage
   - SRS：SM-2 精簡版（Again / Hard / Good / Easy 四級）
   - 語音：Web Speech API（speechSynthesis 朗讀 + SpeechRecognition 口說評分）
   ===================================================================== */

const LS = {
  prog:"voca_progress",   // { id: {ease, interval, due, reps, lapses, status} }
  cfg:"voca_config",      // { dailyNew, dailyReview }
  log:"voca_log",         // { "YYYY-MM-DD": count }
  extra:"voca_extra",     // 使用者自行匯入的單字
  streak:"voca_streak",   // { current, last }
  sync:"voca_sync"        // { url, key, uid, auto }
};
const load=(k,d)=>{try{return JSON.parse(localStorage.getItem(k))??d}catch{return d}};
const save=(k,v)=>localStorage.setItem(k,JSON.stringify(v));

// ---- 狀態 ----
let WORDS = [];                       // 全部單字（種子 + 匯入）
let progress = load(LS.prog,{});
let config   = load(LS.cfg,{dailyNew:15, dailyReview:60});
let dailyLog = load(LS.log,{});
let streak   = load(LS.streak,{current:0,last:null});

function normalizeWord(w){
  // 相容舊欄位：phonetic→kk、example/exampleZh→examples[]
  if(!w.kk && w.phonetic) w.kk = w.phonetic;
  if(!Array.isArray(w.examples)){
    w.examples = w.example ? [{en:w.example, zh:w.exampleZh||""}] : [];
  }
  if(!w.img) w.img = w.word;
  return w;
}
function rebuildWords(){
  const extra = load(LS.extra,[]);
  WORDS = [...(window.SEED_WORDS||[]), ...extra].map(normalizeWord);
}
rebuildWords();

// 取主例句 / 圖片網址
const ex0 = w => (w.examples && w.examples[0]) || {en:"", zh:""};
function imgURL(w){ return "https://loremflickr.com/320/200/"+encodeURIComponent(w.img||w.word); }

// ---- 日期工具 ----
const todayStr=()=>new Date().toISOString().slice(0,10);
const addDays=(n)=>{const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)};

// ---- SRS 取卡 ----
function getProg(id){ return progress[id] || {ease:2.5,interval:0,due:null,reps:0,lapses:0,status:"new"} }
function dueReviews(){
  const t=todayStr();
  return WORDS.filter(w=>{const p=progress[w.id];return p&&p.status!=="new"&&p.due&&p.due<=t});
}
function newCards(){ return WORDS.filter(w=>!progress[w.id]||progress[w.id].status==="new") }

// 今日學習佇列：到期複習 + 限量新字
function buildSession(includeNew=true){
  const due = dueReviews();
  const fresh = includeNew ? newCards().slice(0,config.dailyNew) : [];
  return [...due, ...fresh];
}

// ---- SM-2 精簡評分 ----
// grade: 0=Again 1=Hard 2=Good 3=Easy
function grade(id, g){
  let p = getProg(id);
  if(g===0){ // 忘記
    p.reps=0; p.interval=0; p.lapses++; p.ease=Math.max(1.3,p.ease-0.2);
    p.due=todayStr(); p.status="learning";
  }else{
    if(g===1){ p.ease=Math.max(1.3,p.ease-0.15); }
    if(g===3){ p.ease=p.ease+0.15; }
    p.reps++;
    if(p.reps===1) p.interval = g===1?1: g===3?3:1;
    else if(p.reps===2) p.interval = g===1?3: g===3?8:4;
    else p.interval = Math.round(p.interval * (g===1?1.3:p.ease) * (g===3?1.3:1));
    p.interval=Math.max(1,p.interval);
    p.due=addDays(p.interval); p.status="review";
  }
  progress[id]=p; save(LS.prog,progress);
  logStudy();
}
function logStudy(){
  const t=todayStr();
  dailyLog[t]=(dailyLog[t]||0)+1; save(LS.log,dailyLog);
  if(streak.last!==t){
    const y=addDays(-1);
    streak.current = (streak.last===y)? streak.current+1 : 1;
    streak.last=t; save(LS.streak,streak);
  }
  autoPush();
}

// ---- 語音：朗讀 ----
let voices=[];
function loadVoices(){ voices=speechSynthesis.getVoices(); }
if('speechSynthesis' in window){ loadVoices(); speechSynthesis.onvoiceschanged=loadVoices; }
let preferredVoice=null;
function pickVoice(){
  if(!voices.length) return null;
  // 依品質排序偏好:優先挑自然 / 神經網路嗓音
  const prefs=[
    /Google US English/i, /Natural/i, /Neural/i, /Samantha/i, /Ava/i,
    /Allison/i, /Serena/i, /Jenny/i, /Aria/i, /Nicky/i, /Zira/i
  ];
  const us=voices.filter(v=>/^en[-_]?US/i.test(v.lang));
  for(const p of prefs){ const v=us.find(v=>p.test(v.name)); if(v) return v; }
  return us[0] || voices.find(v=>/^en/i.test(v.lang)) || null;
}
function speak(text, rate){
  if(!('speechSynthesis' in window)){toast("此瀏覽器不支援朗讀");return;}
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="en-US";
  // 自然語速:單字放慢、句子接近正常;語調自然
  const words=(text.trim().split(/\s+/).length);
  u.rate = rate!=null ? rate : (words<=1 ? 0.85 : 0.96);
  u.pitch = 1.0; u.volume = 1.0;
  if(!preferredVoice) preferredVoice=pickVoice();
  if(preferredVoice) u.voice=preferredVoice;
  speechSynthesis.speak(u);
}

// =====================================================================
//  雲端同步（Supabase REST）
//  表格：voca_sync (uid text primary key, data jsonb, updated_at timestamptz)
// =====================================================================
let syncCfg = load(LS.sync, {url:"", key:"", uid:"", auto:false});
function syncReady(){ return syncCfg.url && syncCfg.key && syncCfg.uid; }
function collectData(){
  return {progress, config, dailyLog, streak, extra:load(LS.extra,[])};
}
function applyData(d){
  if(!d) return;
  if(d.progress){progress=d.progress; save(LS.prog,progress);}
  if(d.config){config=d.config; save(LS.cfg,config);}
  if(d.dailyLog){dailyLog=d.dailyLog; save(LS.log,dailyLog);}
  if(d.streak){streak=d.streak; save(LS.streak,streak);}
  if(d.extra){save(LS.extra,d.extra); rebuildWords();}
}
async function syncUp(silent){
  if(!syncReady()){ if(!silent)toast("請先填寫雲端設定"); return; }
  const base=syncCfg.url.replace(/\/+$/,"");
  try{
    const res=await fetch(base+"/rest/v1/voca_sync?on_conflict=uid",{
      method:"POST",
      headers:{ "apikey":syncCfg.key, "Authorization":"Bearer "+syncCfg.key,
        "Content-Type":"application/json", "Prefer":"resolution=merge-duplicates,return=minimal" },
      body:JSON.stringify([{uid:syncCfg.uid, data:collectData(), updated_at:new Date().toISOString()}])
    });
    if(!res.ok) throw new Error("HTTP "+res.status);
    if(!silent) toast("已上傳到雲端 ☁️✓");
    return true;
  }catch(e){ if(!silent) toast("上傳失敗："+e.message); return false; }
}
async function syncDown(silent){
  if(!syncReady()){ if(!silent)toast("請先填寫雲端設定"); return; }
  const base=syncCfg.url.replace(/\/+$/,"");
  try{
    const res=await fetch(base+"/rest/v1/voca_sync?uid=eq."+encodeURIComponent(syncCfg.uid)+"&select=data,updated_at",{
      headers:{ "apikey":syncCfg.key, "Authorization":"Bearer "+syncCfg.key }
    });
    if(!res.ok) throw new Error("HTTP "+res.status);
    const rows=await res.json();
    if(!rows.length){ if(!silent) toast("雲端還沒有資料，先上傳一次"); return; }
    applyData(rows[0].data);
    if(!silent) toast("已從雲端下載 ☁️↓");
    render(currentTab==="settings"?"settings":"home");
    return true;
  }catch(e){ if(!silent) toast("下載失敗："+e.message); return false; }
}
// 學習後自動上傳（防抖）
let syncTimer=null;
function autoPush(){
  if(!syncCfg.auto || !syncReady()) return;
  clearTimeout(syncTimer); syncTimer=setTimeout(()=>syncUp(true), 4000);
}

// =====================================================================
//  視圖渲染
// =====================================================================
const main=document.getElementById("main");
let currentTab="home";

function render(tab){
  currentTab=tab;
  document.querySelectorAll("nav button").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));
  document.getElementById("streakN").textContent=streak.current||0;
  ({home:viewHome, review:viewReview, speak:viewSpeak, lib:viewLib, stats:viewStats})[tab]();
}
document.querySelectorAll("nav button").forEach(b=>b.onclick=()=>render(b.dataset.tab));

// ---------- 今日首頁 ----------
function viewHome(){
  const due=dueReviews().length;
  const fresh=Math.min(newCards().length,config.dailyNew);
  const learned=WORDS.filter(w=>progress[w.id]&&progress[w.id].status!=="new").length;
  const todayCount=dailyLog[todayStr()]||0;
  main.innerHTML=`
   <div class="view">
    <div class="panel" style="background:linear-gradient(150deg,#23304f,#1b2030)">
      <div style="font-size:13px;color:var(--sub)">今天要完成</div>
      <div style="font-size:34px;font-weight:800;margin:4px 0">${due+fresh} <span style="font-size:16px;color:var(--sub)">張卡</span></div>
      <div style="font-size:13px;color:var(--sub)">複習 ${due} 張 ・ 新字 ${fresh} 張 ・ 今日已學 ${todayCount}</div>
      <button class="btn" style="margin-top:16px" onclick="startSession()">▶ 開始今日學習</button>
    </div>

    <div class="row">
      <div class="stat"><div class="n">${learned}</div><div class="l">已學單字</div></div>
      <div class="stat"><div class="n">${WORDS.length}</div><div class="l">單字總數</div></div>
      <div class="stat"><div class="n">${streak.current||0}</div><div class="l">連續天數</div></div>
    </div>

    <div class="sec-title">快速功能</div>
    <div class="row" style="margin-bottom:10px">
      <button class="btn ghost" onclick="render('review')">🗂️ 複習卡</button>
      <button class="btn ghost" onclick="render('speak')">🎙️ 口說練習</button>
    </div>
    <div class="row">

function flip(){
  if(flipped) return;
  flipped=true;
  const f=document.getElementById("flash");
  f.querySelector(".front").classList.add("hidden");
  f.querySelector(".back").classList.remove("hidden");

  speak(w.word,0.9);

function preview(id,g){ // 顯示這個選項大概多久後再見
  const p=getProg(id); let iv;
  if(p.reps===0) iv=g===1?1:g===3?1:1;
  else if(p.reps===1) iv=g===1?3:g===3?8:4;
  else iv=Math.round(p.interval*(g===1?1.3:p.ease)*(g===3?1.3:1));
  return iv<=1?"1天":iv+"天";
}
function rate(g){
  grade(session[sIdx].id,g);
  if(g===0) session.push(session[sIdx]); // 忘記的卡，本回合稍後再出現
  sIdx++; flipped=false;
  document.getElementById("streakN").textContent=streak.current||0;
  viewReview();
}

let recog=null, recActive=false, speakPool=[], spIdx=0;
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
function buildSpeakPool(){
  // 優先用已學過的字，沒有就用全部；把每句例句都攤平成一個練習項目
  const learned=WORDS.filter(w=>progress[w.id]&&progress[w.id].status!=="new");
  const src=(learned.length?learned:WORDS);
  const pool=[];
  src.forEach(w=>w.examples.forEach(e=>pool.push({word:w.word, en:e.en, zh:e.zh, theme:w.theme})));
  return pool;
}
function viewSpeak(){
  if(!speakPool.length){ speakPool=buildSpeakPool(); spIdx=0; }
  if(!speakPool.length){ main.innerHTML=`<div class="view empty"><div class="big">📚</div><h3>還沒有單字</h3></div>`; return; }
  const w=speakPool[spIdx%speakPool.length];
  const supported=!!SR;
  main.innerHTML=`
   <div class="view">
    <div class="panel speak-card">
      <div style="font-size:12px;color:var(--sub)">跟著唸這句生活口語 ・ ${w.theme||""} ・ <b style="color:var(--accent)">${w.word}</b></div>
      <div class="target-sent">"${w.en}"</div>
      <div class="ex-zh" style="color:var(--sub);font-size:14px">${w.zh}</div>
      <button class="spk sm" style="margin:14px auto 0" onclick="speak('${esc(w.en)}',0.92)">🔊 聽範例</button>
      ${supported?`
      <button class="mic-btn" id="micBtn" onclick="toggleRec('${esc(w.en)}')">🎙️</button>
      <div style="font-size:13px;color:var(--sub)" id="micHint">點麥克風開始錄音</div>
      <div class="score-ring hidden" id="scoreRing"></div>
      <div class="heard" id="heard"></div>`
      :`<div style="margin-top:20px;color:var(--warn);font-size:14px">⚠️ 此瀏覽器不支援語音辨識<br><span style="color:var(--sub);font-size:13px">請用手機版 Chrome 開啟以使用口說評分</span></div>`}
    </div>
    <div class="row">
      <button class="btn ghost" onclick="spIdx=(spIdx-1+speakPool.length)%speakPool.length;viewSpeak()">‹ 上一句</button>
      <button class="btn ghost" onclick="spIdx=(spIdx+1)%speakPool.length;viewSpeak()">下一句 ›</button>
    </div>
    <div style="text-align:center;color:var(--sub);font-size:12px;margin-top:10px">第 ${spIdx%speakPool.length+1} / ${speakPool.length} 句</div>
   </div>`;
}
function toggleRec(target){
  if(!SR) return;
  if(recActive){ recog&&recog.stop(); return; }
  recog=new SR(); recog.lang="en-US"; recog.interimResults=false; recog.maxAlternatives=1;
  const btn=document.getElementById("micBtn"), hint=document.getElementById("micHint");
  recog.onstart=()=>{recActive=true;btn.classList.add("rec");btn.textContent="⏹";hint.textContent="聆聽中…請說話";};
  recog.onerror=(e)=>{hint.textContent="辨識失敗："+e.error;cleanupRec();};
  recog.onend=()=>cleanupRec();
  recog.onresult=(e)=>{ scoreSpeech(e.results[0][0].transcript, target); };
  try{recog.start();}catch{ hint.textContent="無法啟動麥克風"; }
}
function cleanupRec(){
  recActive=false; const btn=document.getElementById("micBtn");
  if(btn){btn.classList.remove("rec");btn.textContent="🎙️";}
}
function scoreSpeech(heardRaw, target){
  const norm=s=>s.toLowerCase().replace(/[^a-z' ]/g," ").split(/\s+/).filter(Boolean);
  const tgt=norm(target), heard=norm(heardRaw);
  const hset=[...heard];
  let hit=0; const marks=tgt.map(w=>{
    const i=hset.indexOf(w);
    if(i>-1){hset.splice(i,1);hit++;return `<span class="ok">${w}</span>`;}
    return `<span class="miss">${w}</span>`;
  });
  const score=Math.round(hit/tgt.length*100);
  const ring=document.getElementById("scoreRing"), heardEl=document.getElementById("heard");
  ring.classList.remove("hidden");
  ring.style.color = score>=80?"var(--good)":score>=50?"var(--warn)":"var(--bad)";
  ring.textContent=score+"分";
  heardEl.innerHTML=`<div style="margin-bottom:4px">${marks.join(" ")}</div>
    <div style="font-size:13px">你說的：「${heardRaw}」</div>`;
  document.getElementById("micHint").textContent= score>=80?"很棒！發音很到位 👏":score>=50?"不錯，再多練幾次":"再聽一次範例試試";
  if(score>=60) logStudy(), document.getElementById("streakN").textContent=streak.current||0;
}

function doImport(){
  const raw=document.getElementById("impCsv").value.trim();
  if(!raw){toast("請先貼上內容");return;}
  const extra=load(LS.extra,[]); let n=0;
  if(raw[0]==="["||raw[0]==="{"){
    // JSON 匯入（支援完整新格式）
    let arr; try{ arr=JSON.parse(raw); }catch(e){ toast("JSON 格式錯誤"); return; }
    if(!Array.isArray(arr)) arr=[arr];
    arr.forEach((o,i)=>{
      if(!o.word) return;
      extra.push(normalizeWord({
        id:"u"+Date.now()+"_"+i, word:o.word, kk:o.kk||o.phonetic||"", pos:o.pos||"",
        meaning:o.meaning||"", examples:o.examples, example:o.example, exampleZh:o.exampleZh,
        img:o.img||o.word, theme:o.theme||"我的匯入", level:+(o.level||2)||2
      })); n++;
    });
  }else{
    // CSV 匯入
    raw.split(/\r?\n/).forEach((line,i)=>{
      const c=splitCsv(line); if(c.length<4)return;
      extra.push(normalizeWord({
        id:"u"+Date.now()+"_"+i, word:c[0]||"", kk:c[1]||"", pos:c[2]||"", meaning:c[3]||"",
        example:c[4]||"", exampleZh:c[5]||"", img:c[0]||"", theme:c[6]||"我的匯入", level:+(c[7]||2)||2
      })); n++;
    });
  }
  save(LS.extra,extra); rebuildWords();
  toast(`已匯入 ${n} 個單字 ✅`); render('lib');
}
function splitCsv(line){ // 支援引號
  const out=[];let cur="",q=false;
  for(const ch of line){
    if(ch==='"'){q=!q;continue;}
    if(ch===','&&!q){out.push(cur.trim());cur="";continue;}
    cur+=ch;
  } out.push(cur.trim()); return out;
}
function exportData(){
  const blob=new Blob([JSON.stringify({progress,config,dailyLog,streak,extra:load(LS.extra,[])},null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="voca-backup-"+todayStr()+".json"; a.click();
  toast("備份已下載");
}

  document.getElementById(k==="dailyNew"?"cfgNew":"cfgRev").textContent=config[k]; }
function resetProg(){ if(confirm("確定要清除所有學習進度嗎？")){ progress={};dailyLog={};streak={current:0,last:null};
  save(LS.prog,progress);save(LS.log,dailyLog);save(LS.streak,streak); toast("已重設"); render('home'); } }

// ---- 雲端同步設定操作 ----
function saveSyncCfg(){
  syncCfg.url=(document.getElementById("syncUrl").value||"").trim();
  syncCfg.key=(document.getElementById("syncKey").value||"").trim();
  syncCfg.uid=(document.getElementById("syncUid").value||"").trim();
  save(LS.sync,syncCfg); toast("雲端設定已儲存"); render('settings');
}
function toggleAuto(){ syncCfg.auto=!syncCfg.auto; save(LS.sync,syncCfg); render('settings');
  toast(syncCfg.auto?"自動上傳已開啟":"自動上傳已關閉"); }
function selectAll(el){ const r=document.createRange(); r.selectNodeContents(el);
  const s=getSelection(); s.removeAllRanges(); s.addRange(r); toast("已選取，可複製"); }

// ---------- 統計 ----------
function viewStats(){
  const learned=WORDS.filter(w=>progress[w.id]&&progress[w.id].status!=="new").length;
  const mastered=WORDS.filter(w=>{const p=progress[w.id];return p&&p.interval>=8}).length;
  // 近 7 日長條
  const days=[...Array(7)].map((_,i)=>addDays(-(6-i)));
  const counts=days.map(d=>dailyLog[d]||0);
  const max=Math.max(1,...counts);
  const wk=["日","一","二","三","四","五","六"];
  const total=Object.values(dailyLog).reduce((a,b)=>a+b,0);
  main.innerHTML=`
   <div class="view">
    <div class="row">
      <div class="stat"><div class="n">${learned}</div><div class="l">已學單字</div></div>
      <div class="stat"><div class="n" style="color:var(--good)">${mastered}</div><div class="l">已熟練</div></div>
      <div class="stat"><div class="n" style="color:var(--warn)">${streak.current||0}</div><div class="l">連續天數</div></div>
    </div>
    <div class="panel">
      <div style="font-weight:700;margin-bottom:4px">近 7 日複習量</div>
      <div class="bars">${counts.map((c,i)=>`<div class="b" style="height:${Math.round(c/max*100)}%"><span>${wk[new Date(days[i]).getDay()]}</span></div>`).join("")}</div>
      <div style="margin-top:28px;font-size:13px;color:var(--sub)">累計複習 ${total} 次</div>
    </div>
    <div class="panel">
      <div style="font-weight:700;margin-bottom:10px">主題進度</div>
      ${themeProgress()}
    </div>
   </div>`;
}
function themeProgress(){
  const themes=[...new Set(WORDS.map(w=>w.theme).filter(Boolean))];
  return themes.map(t=>{
    const all=WORDS.filter(w=>w.theme===t);
    const done=all.filter(w=>progress[w.id]&&progress[w.id].status!=="new").length;
    const pct=Math.round(done/all.length*100);
    return `<div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px"><span>${t}</span><span style="color:var(--sub)">${done}/${all.length}</span></div>
      <div class="progbar"><i style="width:${pct}%"></i></div></div>`;
  }).join("");
}

// 把 importView / settings 接到 render
const _render=render;
render=function(tab){
  if(tab==="importView"){currentTab=tab;viewImportView();return;}
  if(tab==="settings"){currentTab=tab;viewSettings();return;}
  _render(tab);
};

// ---- 工具 ----
function esc(s){return (s||"").replace(/'/g,"\\'").replace(/"/g,'&quot;')}
let toastT;
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),1900);}

// ---- 啟動 ----
render("home");

// ---- 註冊 Service Worker（離線）----
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
</script>
